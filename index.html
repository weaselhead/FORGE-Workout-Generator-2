<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
    <title>FORGE v2 -- Workout System</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,400;0,500;0,600;1,400&display=swap');
        
        /* THEME & RESET */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        :root { --a: #FF6B35; --a-dim: rgba(255,107,53,.15); --bg: #080808; --card: #0e0e0e; }
        html, body { background: var(--bg); color: #F0EDE8; font-family: 'DM Sans', sans-serif; height: 100%; -webkit-font-smoothing: antialiased; overflow-x: hidden; }
        h1, h2, h3, .bebas { font-family: 'Bebas Neue', Impact, sans-serif; letter-spacing: 2px; }

        /* LAYOUT */
        .main { max-width: 820px; margin: 0 auto; padding: 20px; padding-bottom: 100px; }
        .fade { animation: fi .3s ease-out; }
        @keyframes fi { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* HEADER */
        .hdr { border-bottom: 1px solid #111; padding: 14px 22px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; background: var(--bg); z-index: 200; }
        .hdr-logo { font-size: 1.8rem; letter-spacing: 5px; color: #fff; }
        .hdr-ver { font-size: .6rem; color: var(--a); letter-spacing: 3px; }

        /* BUTTONS */
        .btn-p { background: var(--a); color: #000; border: none; padding: 16px; font-family: 'Bebas Neue'; font-size: 1.2rem; cursor: pointer; transition: .2s; clip-path: polygon(0 0, calc(100% - 12px) 0, 100% 12px, 100% 100%, 12px 100%, 0 calc(100% - 12px)); width: 100%; margin-top: 20px; }
        .btn-p:hover { filter: brightness(1.2); transform: scale(1.01); }

        /* GRID SYSTEM */
        .sec { margin-bottom: 30px; }
        .sec-label { font-size: .75rem; color: #666; margin-bottom: 12px; letter-spacing: 3px; text-transform: uppercase; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 4px; }
